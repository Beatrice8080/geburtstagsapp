<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport-fit=cover: content extends into safe areas (notch, home bar).
    We then add CSS padding via env(safe-area-inset-*) so content is never
    hidden – this is required for a proper full-screen iPhone PWA experience.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <!-- iOS PWA configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Geburtstage" />

  <!-- Theme colour (browser chrome / Safari toolbar) -->
  <meta name="theme-color" content="#fff9f5"
        media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#151019"
        media="(prefers-color-scheme: dark)" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- iOS home-screen icon (180×180 for iPhone 13+) -->
  <link rel="apple-touch-icon" href="icons/icon-180.png?v=1.2.0" />

  <!-- Inter via Google Fonts (weights 400–700, subset Latin) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <title>Geburtstagsapp</title>

  <!--
    CSS loading order:
      1. variables  – design tokens (must come first)
      2. base       – reset, layout, view system
      3. components – reusable UI elements
      4. calendar   – calendar-specific styles
      5. transitions – view transition animations
  -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/calendar.css" />
  <link rel="stylesheet" href="css/transitions.css" />
</head>
<body>
  <div id="app">
    <!--
      All views are stacked absolutely.
      JavaScript manages which view is visible by adding/removing CSS classes.

      Z-index hierarchy:
        view--base     (calendar)  z-index: 0
        view           (day, form, settings)  z-index: 2 when active
        view--overlay  (start)     z-index: 10
        modal          (delete)    z-index: 100
    -->

    <!-- Base layer: always rendered, never removed from DOM -->
    <div id="view-calendar"
         class="view view--base"
         role="main"
         aria-label="Kalenderansicht"></div>

    <!-- Slides in over the calendar from the search button -->
    <div id="view-search"
         class="view"
         role="main"
         aria-label="Suche"></div>

    <!-- Slides in over the calendar when a day is tapped -->
    <div id="view-day"
         class="view"
         role="main"
         aria-label="Tages-Detailansicht"></div>

    <!-- Slides in over day-view when adding or editing an entry -->
    <div id="view-form"
         class="view"
         role="main"
         aria-label="Geburtstag bearbeiten"></div>

    <!-- Slides in over the calendar from the settings button -->
    <div id="view-settings"
         class="view"
         role="main"
         aria-label="Einstellungen"></div>

    <!--
      Start view: shown on top of calendar every time the app opens.
      Uses a slide-up animation (class: view--overlay).
      Closing it reveals the calendar underneath.
    -->
    <div id="view-start"
         class="view view--overlay"
         role="main"
         aria-label="Heutige Geburtstage"></div>

    <!--
      Delete confirmation modal.
      Sits above all views; toggled via aria-hidden and a CSS class.
    -->
    <div id="modal-delete"
         class="modal"
         role="dialog"
         aria-modal="true"
         aria-hidden="true"
         aria-labelledby="modal-delete-title"></div>

    <!-- Persistent bottom tab bar (z-index: 15, above the start overlay) -->
    <nav id="tab-bar" class="tab-bar" role="tablist" aria-label="Navigation">
      <button class="tab-bar__btn" data-tab="liste" role="tab" aria-label="Aktuell">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 12 20 22 4 22 4 12"/>
          <rect x="2" y="7" width="20" height="5"/>
          <line x1="12" y1="22" x2="12" y2="7"/>
          <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
          <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
        </svg>
        <span class="tab-bar__label">Aktuell</span>
      </button>
      <button class="tab-bar__btn" data-tab="kalender" role="tab" aria-label="Kalender">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span class="tab-bar__label">Kalender</span>
      </button>
      <button class="tab-bar__btn" data-tab="mehr" role="tab" aria-label="Mehr">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83
                   l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21
                   a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0
                   -1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0
                   4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65
                   0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1
                   2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0
                   1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65
                   0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65
                   0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                   a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span class="tab-bar__label">Mehr</span>
      </button>
    </nav>
  </div>

  <!-- Service Worker registration (runs after page load, never blocks) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.warn('Service Worker Registrierung fehlgeschlagen:', err);
        });
      });
    }
  </script>

  <!-- App entry point (ES module; all other JS is imported from here) -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
